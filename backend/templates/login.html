<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>PerfTracker — Login</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-box" style="text-align:center">
      <div class="login-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></svg>
      </div>
      <h1 class="page-title">Performance Tracker</h1>
      <p class="text-muted mt-1 mb-2">Enter PIN to continue</p>
      <form id="pinForm" class="gap-stack-sm">
        <input type="password" inputmode="numeric" pattern="[0-9]*" id="pinInput" class="pin-input" placeholder="Enter PIN" autofocus>
        <div id="pinError" class="login-error hidden"></div>
        <button type="submit" id="pinBtn" class="btn btn-primary btn-full" style="padding:.75rem" disabled>Unlock</button>
      </form>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  <script>
    const form = document.getElementById('pinForm');
    const input = document.getElementById('pinInput');
    const btn = document.getElementById('pinBtn');
    const err = document.getElementById('pinError');

    input.addEventListener('input', () => {
      btn.disabled = !input.value;
      err.classList.add('hidden');
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.textContent = 'Verifying...';
      err.classList.add('hidden');
      try {
        await API.verifyPin(input.value);
        window.location.href = '/';
      } catch {
        err.textContent = 'Invalid PIN';
        err.classList.remove('hidden');
        input.value = '';
        btn.disabled = true;
        btn.textContent = 'Unlock';
      }
    });
  </script>
</body>
</html>
